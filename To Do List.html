<!DOCTYPE html>
<html>
<head>
  <title>Simple To-Do List</title>

 </head>
<body>
<div id="Bigdiv">
  <h1>My To-Do List</h1>

<p>I created this To-Do List to help you organize your daily tasks.</p>
<div id="innerdiv">
  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
  </div>
  </div>

<style>
body {
background:#e6f7f8;
  display: flex;
  justify-content: center;
  margin-top: 60px;
}

#Bigdiv { 
 background:#87ecee;
  width: 420px;
  padding: 100px;
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;
}
h1{
  font-size: 30px;
}


h2 {
  margin-bottom: 5px;
}

p {
  font-size: 20px;
  color: rgb(10, 1, 1);
}

input {
  width: 70%;
  padding: 7px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

button {
  padding: 7px 10px;
  background-color: #23cdc7;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background-color: #42e8eb;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 15px;
}

li {
  padding: 8px;
  margin-top: 8px;
  background: #f2f2f2;
  border-radius: 4px;
}


</style>

<script>
let tasks = [];

function addTask() {

    let input = document.getElementById("taskInput");
    let taskText = input.value;
    tasks.push(taskText);

    let li = document.createElement("li");
    li.innerText = taskText;
    li.onclick = function () {
        li.style.textDecoration = "line-through";
    }
    document.getElementById("taskList").appendChild(li);

    input.value = "";

    console.log(tasks); 
}

</script>
