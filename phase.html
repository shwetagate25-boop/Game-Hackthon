<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
   <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="App">
    
    <input id="city" type="text" placeholder="weather">
    <button onclick="getweather()">start</button>

    </div>

    <div id="result">
    </div>



    <script>
async function getweather(){
    const city = document.getElementById("city").value;
    const result = document.getElementById("result");

    if (city == ""){
        result.innerHTML = "please enter a city";
        return;
    }

    try{
        result.innerHTML = "Loading...";

        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=71d4a202211a67acdb20db48bfcccc59&units=metric`);

        const data = await response.json();

        if (data.cod !== 200){
            result.innerHTML = "city not found";
            return;
        }

        result.innerHTML = `
        <h3>${data.name}</h3>
        <p>Temp: ${data.main.temp}°C</p>
        <p>Weather: ${data.weather[0].main}</p>
        <p>Wind: ${data.wind.speed} m/s</p>
        `;

    } catch (error){
        result.innerHTML = "Something went wrong";
    }
}
    </script>


</body>
</html>
